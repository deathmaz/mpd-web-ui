services:
  mpd-web-ui:
    build: .
    network_mode: host
    environment:
      - PORT=3000
      - MPD_HOST=localhost
      - MPD_PORT=6600
      - MPD_STREAM_PORT=8000
    restart: unless-stopped

# NOTE: If using rootless Docker, network_mode: host is silently ignored.
# Replace the above with:
#
# services:
#   mpd-web-ui:
#     build: .
#     environment:
#       - PORT=3000
#       - MPD_HOST=<your-host-ip>   # e.g. 192.168.1.50
#       - MPD_PORT=6600
#       - MPD_STREAM_PORT=8000
#     ports:
#       - "3000:3000"
#     restart: unless-stopped
